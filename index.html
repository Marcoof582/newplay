<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Player Automático</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h2>🎵 Meu Player 1</h2>

<audio id="player" controls style="width:300px;"></audio>

<br><br>

<button onclick="anterior()">⏮️</button>
<button onclick="proxima()">⏭️</button>

<ul id="lista" style="list-style:none;"></ul>

<script>
const base = "https://SEU-PROJETO.pages.dev/musicas/";
let musicas = [];
let atual = 0;

const player = document.getElementById("player");
const lista = document.getElementById("lista");

fetch("musicas.json")
  .then(res => res.json())
  .then(data => {
    musicas = data;
    montarLista();
  });

function montarLista(){
  lista.innerHTML = "";
  musicas.forEach((m, i) => {
    const li = document.createElement("li");
    li.innerHTML = `<button onclick="tocar(${i})">${m.nome}</button>`;
    lista.appendChild(li);
  });
}

function tocar(i){
  atual = i;
  player.src = base + musicas[i].arquivo;
  player.play();
}

function proxima(){
  atual = (atual + 1) % musicas.length;
  tocar(atual);
}

function anterior(){
  atual = (atual - 1 + musicas.length) % musicas.length;
  tocar(atual);
}

player.addEventListener("ended", proxima);
</script>

</body>
</html>
