<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
</head>
<body style="text-align:center; font-family: Arial;">

<h2>🎵 Player</h2>

<audio id="player" controls style="width:300px;"></audio>

<ul id="lista" style="list-style:none;"></ul>

<script>
const base = "musicas/";
let musicas = [];

const player = document.getElementById("player");
const lista = document.getElementById("lista");

fetch("musicas.json")
  .then(res => res.json())
  .then(data => {
    musicas = data;
    montarLista();
  })
  .catch(err => console.log("Erro JSON:", err));

function montarLista(){
  lista.innerHTML = "";
  musicas.forEach((m, i) => {
    const li = document.createElement("li");
    li.innerHTML = `<button onclick="tocar(${i})">${m.nome}</button>`;
    lista.appendChild(li);
  });
}

function tocar(i){
  player.src = base + musicas[i].arquivo;
  player.play();
}
</script>

</body>
</html>
